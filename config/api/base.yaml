name: vwap-api
pprof: false
log:
  level: INFO
app_config:
  http:
    addr: 127.0.0.1:8080
    read_timeout: 5s
    write_timeout: 10s
    cors:
      enable: true
      allowed_origins: ["*"]
      allowed_methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      allowed_headers: ["*"]
      exposed_headers: []
      max_age: 600
      allow_credentials: false
  postgresql:
    database: vwap_local
    host: 127.0.0.1
    port: "5434"
    user: postgres
    password: postgres
  redis:
    host: 127.0.0.1
    port: "6379"
    password: ""
    db: 0
  ethereum:
    rpc_urls:
      - "https://ethereum-sepolia-rpc.publicnode.com"
      - "https://sepolia.drpc.org"
      - "https://rpc.sepolia.org"
    # For orderbook EIP-712 and optional indexer (same contract as fill/cancel/settle/refund)
    chain_id: 11155111
    vwap_rfq_contract_addr: "0x61A73573A14898E7031504555c841ea11E7FB07F" # Sepolia VWAPRFQSpot
    use_mock: false
